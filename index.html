<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyrim: Liliths Bestimmung</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --skyrim-gold: #c4b67a;
            --skyrim-silver: #e0e0e0;
            --skyrim-bg: rgba(12, 12, 15, 0.95);
            --emerald: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background: #050505;
            color: white;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Hintergrund mit CSS-Nebelaffekt */
        .world {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            display: none;
            z-index: -1;
        }

        .mist {
            position: absolute;
            width: 200%;
            height: 200%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.2;
            animation: moveMist 60s linear infinite;
        }

        @keyframes moveMist {
            from { transform: translate(-25%, -25%) rotate(0deg); }
            to { transform: translate(0%, 0%) rotate(5deg); }
        }

        /* Cinematic Intro */
        #storyIntro {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .intro-text {
            font-size: 1.6rem;
            line-height: 1.8;
            color: var(--skyrim-silver);
            max-width: 800px;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* Selbstgezeichneter Kompass (SVG) */
        .compass-ui {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            display: none;
            z-index: 100;
        }

        /* Quest Items (SVG Smaragde) */
        .quest-item {
            position: absolute;
            width: 70px;
            height: 70px;
            cursor: pointer;
            z-index: 10;
            display: none;
            filter: drop-shadow(0 0 15px var(--emerald));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* UI Benachrichtigung */
        .notif {
            position: fixed;
            top: 20%;
            width: 100%;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            z-index: 500;
        }

        .notif.active { animation: questIn 4s forwards; }

        @keyframes questIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.9); }
            15% { opacity: 1; transform: translateY(0) scale(1); }
            85% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-30px) scale(1.1); }
        }

        /* Dialog Box */
        #dialogBox {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 300px;
            background: var(--skyrim-bg);
            border-top: 2px solid var(--skyrim-gold);
            padding: 40px 12%;
            display: none;
            z-index: 1000;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.8);
        }

        /* Magierin (SVG Avatar) */
        #mageContainer {
            position: fixed;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 500px;
            display: none;
            z-index: 500;
            filter: drop-shadow(0 0 30px #8a2be2);
        }

        .speaker { color: var(--skyrim-gold); font-size: 1.3rem; margin-bottom: 10px; letter-spacing: 3px; }
        .dialog-content { font-size: 1.5rem; color: #eee; text-shadow: 2px 2px 2px #000; min-height: 4.5em; }

        .btn {
            background: none; border: none; color: #888; font-family: 'Cinzel', serif;
            font-size: 1.1rem; cursor: pointer; display: block; margin-top: 15px; text-align: left;
            transition: 0.3s; width: fit-content;
        }
        .btn:hover { color: #fff; padding-left: 20px; text-shadow: 0 0 10px var(--skyrim-gold); }

        #levelUp {
            position: fixed; inset: 0; background: white; color: black;
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 3000;
            text-align: center;
        }

        .start-quest-btn {
            margin-top: 30px; padding: 12px 35px; background: rgba(255,255,255,0.1);
            border: 1px solid var(--skyrim-gold); color: var(--skyrim-gold);
            font-family: 'Cinzel'; cursor: pointer; font-size: 1.2rem; transition: 0.3s;
        }
        .start-quest-btn:hover { background: var(--skyrim-gold); color: black; }

        /* LOGBUCH CSS */
        #logBtn {
            position: fixed; bottom: 5px; right: 5px; opacity: 0.1; background: none; border: none;
            color: white; font-size: 10px; cursor: pointer; z-index: 5000;
        }
        #logModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000;
            display: none; padding: 40px; overflow-y: auto; font-family: sans-serif;
        }
        .log-entry { border-bottom: 1px solid #333; padding: 10px; font-family: monospace; }
    </style>
</head>
<body>

    <!-- 1. CINEMATIC INTRO -->
    <div id="storyIntro">
        <div>
            <div class="intro-text" id="introTypewriter"></div>
            <button id="startBtn" class="start-quest-btn" style="display:none;" onclick="startGame()">Erwachen</button>
        </div>
    </div>

    <!-- 2. SPIELWELT -->
    <div class="world" id="world"><div class="mist"></div></div>

    <!-- Kompass -->
    <div class="compass-ui" id="compass">
        <svg viewBox="0 0 400 50">
            <line x1="0" y1="40" x2="400" y2="40" stroke="#c4b67a" stroke-width="2" />
            <text x="200" y="30" fill="#c4b67a" font-size="20" text-anchor="middle" font-family="Cinzel">▼</text>
            <text x="200" y="15" fill="#c4b67a" font-size="12" text-anchor="middle">N</text>
        </svg>
    </div>

    <!-- Benachrichtigungen -->
    <div class="notif" id="notif">
        <div style="color: var(--skyrim-gold); font-size: 0.8rem; letter-spacing: 5px; margin-bottom: 5px;">QUEST AKTUALISIERT</div>
        <h2 id="notifTitle" style="font-size: 2.2rem; text-shadow: 0 0 10px #000;"></h2>
    </div>

    <!-- ITEMS -->
    <div class="quest-item" id="item1" style="top: 25%; left: 20%;" onclick="collect(1)">
        <svg viewBox="0 0 100 100"><polygon points="50,5 90,30 90,70 50,95 10,70 10,30" fill="#2ecc71" stroke="#fff" stroke-width="2" /></svg>
    </div>
    <div class="quest-item" id="item2" style="top: 60%; left: 75%;" onclick="collect(2)">
        <svg viewBox="0 0 100 100"><polygon points="50,5 90,30 90,70 50,95 10,70 10,30" fill="#2ecc71" stroke="#fff" stroke-width="2" /></svg>
    </div>
    <div class="quest-item" id="item3" style="top: 75%; left: 25%;" onclick="collect(3)">
        <svg viewBox="0 0 100 100"><polygon points="50,5 90,30 90,70 50,95 10,70 10,30" fill="#2ecc71" stroke="#fff" stroke-width="2" /></svg>
    </div>

    <!-- MANDY -->
    <div id="mageContainer">
        <svg viewBox="0 0 200 400">
            <path d="M100,50 L160,350 L40,350 Z" fill="#1a1a1a" stroke="#8a2be2" stroke-width="2" />
            <circle cx="100" cy="80" r="30" fill="#1a1a1a" stroke="#8a2be2" stroke-width="2" />
            <circle cx="85" cy="80" r="3" fill="#8a2be2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" /></circle>
            <circle cx="115" cy="80" r="3" fill="#8a2be2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" /></circle>
        </svg>
    </div>

    <!-- DIALOG BOX -->
    <div id="dialogBox">
        <div class="speaker">Mandy, Erzmagierin der Herzen</div>
        <div class="dialog-content" id="dialogText"></div>
        <div id="dialogOptions"></div>
    </div>

    <!-- SUCCESS -->
    <div id="levelUp">
        <p style="letter-spacing: 8px;">STUFENAUFSTIEG</p>
        <h1 style="font-size: 5rem;">LIEBE 100</h1>
        <h2>Lilith & Mandy</h2>
    </div>

    <!-- ADMIN LOGBUCH BUTTON & MODAL -->
    <button id="logBtn" onclick="toggleLog()">[LOG]</button>
    <div id="logModal">
        <h2 style="color:var(--skyrim-gold)">Quest-Logbuch (Liliths Aktionen)</h2>
        <button onclick="toggleLog()" style="float:right; padding:5px;">Schließen</button>
        <div id="logContent" style="margin-top:20px;"></div>
        <button onclick="clearLog()" style="margin-top:30px; color:red; background:none; border:none; cursor:pointer;">Protokoll löschen</button>
    </div>

    <script>
        // --- LOGBUCH SYSTEM ---
        function track(event, info = "") {
            const data = JSON.parse(localStorage.getItem('skyrim_antrag_log') || '[]');
            data.push({ time: new Date().toLocaleTimeString(), event, info });
            localStorage.setItem('skyrim_antrag_log', JSON.stringify(data));
        }

        function toggleLog() {
            const m = document.getElementById('logModal');
            if(m.style.display === 'block') { m.style.display = 'none'; }
            else {
                const data = JSON.parse(localStorage.getItem('skyrim_antrag_log') || '[]');
                document.getElementById('logContent').innerHTML = data.map(d => `
                    <div class="log-entry">
                        <strong>[${d.time}]</strong> ${d.event} <br> 
                        <span style="color:var(--skyrim-gold)">${d.info}</span>
                    </div>
                `).join('') || "Noch keine Aktionen aufgezeichnet.";
                m.style.display = 'block';
            }
        }

        function clearLog() {
            localStorage.removeItem('skyrim_antrag_log');
            toggleLog();
        }

        // --- GAME LOGIK ---
        const introString = "In einer Welt voller ungeschriebener Pfade begegneten sich zwei Seelen. Lilith... deine Reise hat dich weit geführt, doch das wichtigste Kapitel beginnt genau hier. Finde die Fragmente der Hoffnung, um die Wahrheit zu erfahren.";
        let itemsCollected = 0;

        window.onload = () => {
            track("Spiel geladen", "Lilith hat die Seite geöffnet");
            startIntro();
        };

        function startIntro() {
            let i = 0;
            const el = document.getElementById('introTypewriter');
            function type() {
                if (i < introString.length) {
                    el.innerHTML += introString.charAt(i); i++;
                    setTimeout(type, 50);
                } else { document.getElementById('startBtn').style.display = 'inline-block'; }
            }
            type();
        }

        function startGame() {
            track("Quest gestartet", "Intro beendet, Spielwelt betreten");
            document.getElementById('storyIntro').style.display = 'none';
            document.getElementById('world').style.display = 'block';
            document.getElementById('compass').style.display = 'block';
            showNotif("Sammle die 3 Smaragde der Hoffnung");
            document.querySelectorAll('.quest-item').forEach(el => el.style.display = 'block');
        }

        function showNotif(title) {
            const n = document.getElementById('notif');
            document.getElementById('notifTitle').textContent = title;
            n.classList.remove('active');
            void n.offsetWidth;
            n.classList.add('active');
        }

        function collect(id) {
            itemsCollected++;
            track("Smaragd gefunden", `Smaragd Nr. ${itemsCollected} eingesammelt`);
            document.getElementById('item' + id).style.display = 'none';
            if (itemsCollected < 3) {
                showNotif(`Smaragde gefunden: ${itemsCollected}/3`);
            } else {
                showNotif("Quest abgeschlossen: Erscheine vor der Erzmagierin");
                setTimeout(triggerMandy, 2000);
            }
        }

        function triggerMandy() {
            track("Magierin erschienen", "Dialog beginnt");
            document.getElementById('world').style.filter = "brightness(0.2) blur(8px)";
            document.getElementById('mageContainer').style.display = 'block';
            document.getElementById('dialogBox').style.display = 'block';
            typeDialog("Du hast Mut bewiesen, Lilith. Die Smaragde leuchten in deiner Gegenwart...", () => {
                setTimeout(() => {
                    typeDialog("Doch nun stellt sich die Frage, die unser Schicksal besiegeln wird: Willst du deine Mandy als Partnerin haben?", () => {
                        askTheQuestion();
                    });
                }, 1500);
            });
        }

        function typeDialog(text, callback) {
            const el = document.getElementById('dialogText');
            el.innerHTML = ""; let i = 0;
            const interval = setInterval(() => {
                el.innerHTML += text.charAt(i); i++;
                if (i >= text.length) { clearInterval(interval); if (callback) callback(); }
            }, 50);
        }

        function askTheQuestion() {
            const options = document.getElementById('dialogOptions');
            options.innerHTML = `
                <button class="btn" onclick="victory()">[Überreden] Ja, ich will! 💕</button>
                <button class="btn" id="runBtn" onmouseenter="runAway()">[Weglaufen] Nein, ich bin noch nicht so weit...</button>
                <button class="btn" onclick="showReward()">[Feilschen] Welche Belohnung erwartet mich?</button>
            `;
        }

        let escapes = 0;
        function runAway() {
            escapes++;
            track("Fluchtversuch", `Lilith hat ${escapes} Mal versucht 'Nein' zu klicken`);
            const btn = document.getElementById('runBtn');
            btn.style.position = 'fixed';
            btn.style.left = Math.random() * 70 + 15 + '%';
            btn.style.top = Math.random() * 50 + 20 + '%';
        }

        function showReward() {
            track("Gefeilscht", "Nach Belohnung gefragt");
            typeDialog("Ein Leben voller Liebe, Abenteuer und unzähliger gemeinsamer Quest-Belohnungen. Also...?", askTheQuestion);
        }

        function victory() {
            track("JA GEKLICKT", "Lilith hat den Antrag angenommen!");
            document.getElementById('levelUp').style.display = 'flex';
        }
    </script>
</body>
</html>
